<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>

    <style>
        div#conteiner {
            background-color: cornflowerblue;
            display: flex;
            flex-flow: row wrap;
            
        }

        div#item {  
            background-color: hotpink ;
            border: 1px solid rgb(231, 5, 114);
            width: 200px;
            height: 100px;
            text-align: center;
            flex: auto;
            
        }

    </style>

</head>
<body>
    <div id="conteiner">
        <div id="item">AAAAAAAAAAAA</div>
        <div id="item">BBBBBBBBBBBB</div>
        <div id="item">CCCCCCCCCCCC</div>
        <div id="item">DDDDDDDDDDDD</div>
        <div id="item">EEEEEEEEEEEE</div>
    </div>
</body>
</html>
